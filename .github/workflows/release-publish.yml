name: teamsacs release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build for ARM64
        run: |
          make release-arm64 BUILD_VERSION="${GITHUB_REF_NAME}" RELEASE_VERSION="${GITHUB_REF_NAME}"
          grep -a "ReleaseVersion=${GITHUB_REF_NAME}" ./release/teamsacs_arm64

      - name: Build for AMD64
        run: |
          make release-amd64 BUILD_VERSION="${GITHUB_REF_NAME}" RELEASE_VERSION="${GITHUB_REF_NAME}"
          ./release/teamsacs_amd64 -v
          grep -a "ReleaseVersion=${GITHUB_REF_NAME}" ./release/teamsacs_amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./release/teamsacs_arm64
            ./release/teamsacs_amd64

  build-and-push-docker-image:
    name: Build Docker image and push to repositories
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image and push to Docker Hub
        uses: docker/build-push-action@v6
        id: docker_build
        with:
          context: ./
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            RELEASE_VERSION=${{ github.ref_name }}
            COMMIT_SHA1=${{ github.sha }}
            COMMIT_DATE=${{ github.ref_name }}
            COMMIT_USER=${{ github.actor }}
            COMMIT_SUBJECT=release ${{ github.ref_name }}
          tags: |
            ca17/teamsacs:${{ github.ref_name }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
